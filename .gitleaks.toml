title = "flowai-workflow gitleaks config"

[allowlist]
  description = "Allow documentation files that reference secret patterns"
  paths = [
    '''documents/requirements\.md''',
    '''documents/design\.md''',
    '''\.flowai-workflow/agents/agent-.*/SKILL\.md''',
    '''\.flowai-workflow/tasks/.*\.md''',
    '''\.flowai-workflow/runs/.*''',
    '''CLAUDE\.md''',
    '''AGENTS\.md''',
  ]
