name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            artifact: flowai-workflow-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            artifact: flowai-workflow-linux-arm64
          - target: x86_64-apple-darwin
            artifact: flowai-workflow-darwin-x86_64
          - target: aarch64-apple-darwin
            artifact: flowai-workflow-darwin-arm64

    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Compile
        env:
          VERSION: ${{ github.ref_name }}
        run: deno task compile --target ${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Generate release notes
        id: notes
        run: |
          CURRENT_TAG="${{ github.ref_name }}"
          PREV_TAG=$(git describe --tags --abbrev=0 "${CURRENT_TAG}^" 2>/dev/null || echo "")
          NOTES_FILE=$(mktemp)
          if [ -n "$PREV_TAG" ]; then
            deno run -A scripts/generate-release-notes.ts "$PREV_TAG" "$CURRENT_TAG" "${{ github.repository }}" > "$NOTES_FILE"
          else
            echo "Initial release" > "$NOTES_FILE"
          fi
          echo "notes_file=${NOTES_FILE}" >> $GITHUB_OUTPUT

      - name: Create release and attach binaries
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "flowai-workflow ${{ github.ref_name }}" \
            --notes-file "${{ steps.notes.outputs.notes_file }}" \
            dist/flowai-workflow-linux-x86_64 \
            dist/flowai-workflow-linux-arm64 \
            dist/flowai-workflow-darwin-x86_64 \
            dist/flowai-workflow-darwin-arm64
